<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Builder Pro v3 (Enhanced)</title>

<style>
* {
    box-sizing: border-box;
    font-family: Segoe UI, sans-serif;
}

body {
    margin:0;
    display:flex;
    height:100vh;
    overflow:hidden;
    color:white;
    transition: background 0.6s ease;
}

/* FLOATING GLOW */
body::before, body::after {
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.5;
    z-index:0;
    animation: float 8s infinite alternate ease-in-out;
}

body::before { background:#6366f1; top:-150px; left:-150px; }
body::after { background:#ec4899; bottom:-150px; right:-150px; }

@keyframes float {
    from { transform:translateY(0px); }
    to { transform:translateY(40px); }
}

/* LEFT */
.left {
    width:40%;
    padding:15px;
    overflow:auto;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(12px);
    border-right:1px solid rgba(255,255,255,0.1);
    z-index:2;
}

input, textarea, select {
    width:100%;
    margin:5px 0;
    padding:8px;
    border:none;
    border-radius:8px;
    background:rgba(255,255,255,0.08);
    color:white;
}

button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#ec4899);
    font-weight:bold;
}

/* PROJECT INPUT */
.project {
    padding:10px;
    margin:10px 0;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}

/* RIGHT */
.right {
    width:60%;
    padding:20px;
    overflow:auto;
    z-index:2;
}

/* CARD */
.card {
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    margin-bottom:20px;
    border-radius:14px;
    opacity:0;
    transform:translateY(20px);
    transition:0.6s ease;
}

.card.active {
    opacity:1;
    transform:translateY(0);
}

img, video {
    width:100%;
    margin-top:10px;
    border-radius:10px;
}

/* SKILLS */
.skill{
    display:inline-block;
    padding:6px 12px;
    margin:5px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
    font-size:12px;
    border:1px solid rgba(255,255,255,0.15);
}

/* PROFILE */
.centerProfile{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.profileImg{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
    border:2px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="left">

<h2>🔥 Portfolio Builder Pro</h2>

<input id="name" placeholder="Name">
<textarea id="bio" placeholder="Bio"></textarea>
<input id="skills" placeholder="Skills (comma separated)">
<input type="file" id="profileImg">

<h3>🎨 Theme</h3>
<select id="theme" onchange="applyTheme()">
    <option value="aurora">Aurora Blue</option>
    <option value="neon">Neon Purple</option>
    <option value="sunset">Sunset Orange</option>
    <option value="ocean">Ocean Cyan</option>
    <option value="emerald">Emerald Green</option>
    <option value="galaxy">Galaxy Dark</option>
</select>

<h3>📩 Contact Section</h3>

<label><input type="checkbox" id="enableContact" checked> Enable Contact</label>

<input id="contactEmail" placeholder="Email">
<input id="contactPhone" placeholder="Phone">
<input id="contactLinkedIn" placeholder="LinkedIn URL">

<h3>Projects</h3>
<div id="projects"></div>

<button onclick="addProject()">+ Add Project</button>
<button onclick="render()">Generate Preview</button>
<button onclick="exportHTML()">Export HTML</button>

</div>

<div class="right">
<div id="output"></div>
</div>

<script>

/* THEMES */
const themes = {
aurora:"radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%), radial-gradient(circle at 80% 80%, #9333ea, transparent 40%), #0f172a",
neon:"radial-gradient(circle at 20% 20%, #a855f7, transparent 40%), radial-gradient(circle at 80% 80%, #ec4899, transparent 40%), #0b0f1a",
sunset:"radial-gradient(circle at 20% 20%, #f97316, transparent 40%), radial-gradient(circle at 80% 80%, #ef4444, transparent 40%), #0f172a",
ocean:"radial-gradient(circle at 20% 20%, #06b6d4, transparent 40%), radial-gradient(circle at 80% 80%, #3b82f6, transparent 40%), #0a1220",
emerald:"radial-gradient(circle at 20% 20%, #10b981, transparent 40%), radial-gradient(circle at 80% 80%, #22c55e, transparent 40%), #06110a",
galaxy:"radial-gradient(circle at 20% 20%, #6366f1, transparent 40%), radial-gradient(circle at 80% 80%, #0ea5e9, transparent 40%), #020617"
};

function applyTheme(){
    document.body.style.background = themes[document.getElementById("theme").value];
}

function addProject(){
    const div=document.createElement("div");
    div.className="project";

    div.innerHTML=`
        <input placeholder="Title" class="title">
        <textarea placeholder="Description" class="desc"></textarea>

        <select class="cat">
            <option>Game</option>
            <option>Tool</option>
            <option>Prototype</option>
            <option>Other</option>
        </select>

        <input placeholder="GitHub" class="github">
        <input placeholder="Live" class="live">

        <label>My Contribution (one per line)</label>
        <textarea class="contrib" placeholder="Built UI
API integration
Performance optimization"></textarea>

<label>Images (place files inside /images/ after export)</label>
<input type="file" class="imgs" multiple>
        <label>Video (place file inside /videos/ after export)</label>
        <input type="file" class="video">
    `;

    document.getElementById("projects").appendChild(div);
}

function toBase64(file){
    return new Promise(res=>{
        const r=new FileReader();
        r.onload=()=>res(r.result);
        r.readAsDataURL(file);
    });
}

function initScroll(){
    const obs=new IntersectionObserver(e=>{
        e.forEach(x=>{
            if(x.isIntersecting)x.target.classList.add("active");
        });
    },{threshold:0.15});

    document.querySelectorAll(".card").forEach(c=>obs.observe(c));
}

/* IMAGE SLIDER */
function nextImg(btn){
    const slider = btn.closest(".slider");
    const imgs = slider.querySelectorAll("img");
    let index = [...imgs].findIndex(i => i.style.display !== "none");

    imgs[index].style.display = "none";
    imgs[(index + 1) % imgs.length].style.display = "block";
}

function prevImg(btn){
    const slider = btn.closest(".slider");
    const imgs = slider.querySelectorAll("img");
    let index = [...imgs].findIndex(i => i.style.display !== "none");

    imgs[index].style.display = "none";
    imgs[(index - 1 + imgs.length) % imgs.length].style.display = "block";
}

async function render(){

    const blocks=document.querySelectorAll(".project");
    let html="";

    const profile=document.getElementById("profileImg").files[0];
    let profileImg=profile?await toBase64(profile):"";

    const skillsHTML = document.getElementById("skills").value
        .split(",")
        .map(s=>s.trim())
        .filter(Boolean)
        .map(s=>`<span class="skill">${s}</span>`)
        .join("");

    html += `
    <div class="card centerProfile">
        ${profileImg?`<img class="profileImg" src="${profileImg}">`:""}
        <h1>${document.getElementById("name").value}</h1>
        <p>${document.getElementById("bio").value}</p>
        <div>${skillsHTML}</div>
    </div>`;

    for(let b of blocks){

        const title=b.querySelector(".title").value;
        const desc=b.querySelector(".desc").value;
        const cat=b.querySelector(".cat").value;
        const github=b.querySelector(".github").value;
        const live=b.querySelector(".live").value;

        const contrib=b.querySelector(".contrib").value;

        const imgs=[...b.querySelector(".imgs").files];
        const videoFile=b.querySelector(".video").files[0];

        let imageNames = imgs.map(i => i.name);

        let videoName = videoFile ? videoFile.name : "";

        html+=`
        <div class="card">
            <h2>${title}</h2>
            <small>${cat}</small>
            <p>${desc}</p>

            ${contrib ? `
            <div style="margin-top:10px;padding:12px;border-left:3px solid #6366f1;background:rgba(255,255,255,0.04);border-radius:10px;">
                <strong>My Contribution:</strong>
                <ul style="margin:8px 0 0 18px;">
                    ${contrib.split("\n").filter(x=>x.trim()).map(x=>`<li>${x}</li>`).join("")}
                </ul>
            </div>` : ""}

${imageNames.length ? `
<div class="slider">
    ${imageNames.map((name,i)=>`
        <img src="images/${name}" style="display:${i===0?'block':'none'};">
    `).join("")}

                <div style="display:flex;gap:10px;margin-top:8px;">
                    <button onclick="prevImg(this)">◀ Prev</button>
                    <button onclick="nextImg(this)">Next ▶</button>
                </div>
            </div>` : ""}

	    ${videoName?`<video controls src="videos/${videoName}" preload="metadata"></video>`:""}

            <div style="display:flex;gap:10px;margin-top:12px;">

                ${github?`
                <a href="${github}" target="_blank"
                style="flex:1;padding:10px;border-radius:10px;
                background:linear-gradient(135deg,#6366f1,#4f46e5);
                text-align:center;color:white;font-weight:bold;text-decoration:none;">
                GitHub</a>`:""}

                ${live?`
                <a href="${live}" target="_blank"
                style="flex:1;padding:10px;border-radius:10px;
                background:linear-gradient(135deg,#ec4899,#f97316);
                text-align:center;color:white;font-weight:bold;text-decoration:none;">
                Live</a>`:""}

            </div>
        </div>`;
    }

    if(document.getElementById("enableContact").checked){
        html+=`
        <div class="card">
            <h2>📩 Contact Me</h2>
            <p>${document.getElementById("contactEmail").value}</p>
            <p>${document.getElementById("contactPhone").value}</p>
            <p>${document.getElementById("contactLinkedIn").value}</p>
        </div>`;
    }

    document.getElementById("output").innerHTML=html;
    initScroll();
}

function exportHTML(){

const html = document.getElementById("output").innerHTML;

/* GET CURRENT THEME */
const theme = document.getElementById("theme").value;
const bg = themes[theme];

/* COPY FULL STYLES */
const styles = document.querySelector("style").innerHTML;

const full = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Portfolio</title>

<style>
${styles}
html, body {
    height: auto !important;
    overflow: auto !important;
}
body {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.container {
    width: 100%;
    max-width: 900px;
}

/* APPLY SAME BACKGROUND */
body {
    background: ${bg};
}
</style>

</head>
<body>

<div class="container">
    ${html}
</div>

<script>

/* SCROLL ANIMATION */
const obs=new IntersectionObserver(e=>{
    e.forEach(x=>{
        if(x.isIntersecting)x.target.classList.add("active");
    });
},{threshold:0.15});

document.querySelectorAll(".card").forEach(c=>obs.observe(c));

/* SLIDER */
function nextImg(btn){
    const slider = btn.closest(".slider");
    const imgs = slider.querySelectorAll("img");
    let index = [...imgs].findIndex(i => i.style.display !== "none");

    imgs[index].style.display = "none";
    imgs[(index + 1) % imgs.length].style.display = "block";
}

function prevImg(btn){
    const slider = btn.closest(".slider");
    const imgs = slider.querySelectorAll("img");
    let index = [...imgs].findIndex(i => i.style.display !== "none");

    imgs[index].style.display = "none";
    imgs[(index - 1 + imgs.length) % imgs.length].style.display = "block";
}

<\/script>

</body>
</html>`;

/* DOWNLOAD */
const blob = new Blob([full], {type:"text/html"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "portfolio.html";
a.click();
}
applyTheme();
</script>

</body>
</html>
